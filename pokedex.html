<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <style>
    :root {
      --page-bg: #eef4f6;
      --grid-line: rgba(98, 135, 148, 0.12);
      --panel: #dfeaf0;
      --panel-light: #eef6f8;
      --blue: #6aa9c4;
      --blue-dark: #3f6473;
      --coral: #e8755f;
      --text: #405965;
      --muted: #7d99a5;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background-color: var(--page-bg);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    header {
      max-width: 1180px;
      margin: 28px auto 10px;
      padding: 34px 24px;
      border-radius: 14px;
      background: linear-gradient(135deg, #b7def1 0%, #f3d3dc 100%);
      border: 1px solid rgba(106, 169, 196, 0.28);
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: clamp(44px, 9vw, 92px);
      text-transform: uppercase;
      color: #15202a;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px 54px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 200px auto;
      gap: 10px;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid rgba(91, 125, 138, 0.2);
    }

    input, select, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(91,125,138,0.2);
      background: var(--panel-light);
      font-weight: 600;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    button { cursor: pointer; color: var(--blue-dark); }
    button.active { background: var(--coral); color: white; border-color: transparent; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
      gap: 10px;
    }

    .card {
      padding: 12px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid rgba(91, 125, 138, 0.2);
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .card:hover { transform: translateY(-3px); }

    .card img {
      width: 92px;
      height: 92px;
      margin: 10px auto;
      display: block;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      padding: 6px;
      object-fit: contain;
    }

    .pokemon-id {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      font-weight: 800;
    }

    .pokemon-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--blue-dark);
      margin-bottom: 10px;
    }

    .types {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .modal-header .types { justify-content: flex-start; }

    .type, .tag {
      display: inline-block;
      background: var(--blue);
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 800;
    }

    .type:nth-child(2) { background: var(--coral); }
    .tag { background: var(--coral); margin: 2px; }

    .status {
      grid-column: 1 / -1;
      padding: 24px;
      border-radius: var(--radius);
      background: var(--panel);
      text-align: center;
      font-weight: 700;
      color: var(--muted);
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(64, 89, 101, 0.42);
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal {
      position: relative;
      background: var(--panel);
      padding: 18px;
      border-radius: 14px;
      max-width: 760px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      border: 1px solid rgba(91, 125, 138, 0.22);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: var(--coral);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .modal-close svg { display: block; }

    .modal-header {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      align-items: center;
      padding: 14px;
      border-radius: 12px;
      background: var(--panel-light);
      border: 1px solid rgba(91, 125, 138, 0.14);
    }

    .modal-header img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      padding: 8px;
    }

    .header-sprites {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 110px;
      height: 110px;
      flex-shrink: 0;
    }

    .header-main-sprite {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      padding: 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .header-shiny {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 0;
      background: linear-gradient(135deg, #ffe08a 0%, #ffc94d 100%);
      color: #7a5400;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      transition: transform 0.15s ease;
      z-index: 3;
    }

    .header-shiny:hover { transform: scale(1.08); }
    .header-shiny.active { background: linear-gradient(135deg, #ffd36b 0%, #ffb347 100%); }

    .evolution-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .evolution-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--blue-dark);
    }

    .evolution-condition {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
    }

    .modal-title {
      margin: 0 34px 8px 0;
      color: var(--blue-dark);
      font-size: 32px;
      line-height: 1;
    }

    .modal-id {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
      align-items: stretch;
    }

    .info-block.full-row { grid-column: 1 / -1; }

    .info-block {
      padding: 13px;
      border-radius: 12px;
      background: var(--panel-light);
      border: 1px solid rgba(91, 125, 138, 0.14);
      line-height: 1.45;
      font-size: 14px;
      min-width: 0;
    }

    .info-block strong {
      display: block;
      margin-bottom: 6px;
      color: var(--blue-dark);
      font-size: 14px;
    }

    .evolution-prev,
    .evolution-next-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
    }

    .evolution-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      background: #d6e7ee;
      border: 1px solid rgba(91, 125, 138, 0.18);
      cursor: pointer;
      font-weight: 800;
      color: var(--blue-dark);
      text-align: left;
      font-size: 13px;
    }

    .evolution-chip img {
      width: 88px;
      height: 88px;
      object-fit: contain;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      padding: 5px;
      flex-shrink: 0;
    }

    .zone-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .zone-tag {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 7px;
      background: var(--blue);
      color: white;
      font-size: 11px;
      font-weight: 800;
    }

    .mega-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .mega-card {
      padding: 10px;
      border-radius: 10px;
      background: #d6e7ee;
      border: 1px solid rgba(91, 125, 138, 0.18);
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }

    .mega-card img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      display: block;
      margin: 6px auto;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      padding: 6px;
    }

    @media (max-width: 680px) {
      header { margin: 12px; }
      .container { padding: 0 12px 32px; }
      .controls { grid-template-columns: 1fr; }
      .modal-header { grid-template-columns: 1fr; text-align: center; }
      .modal-header img { margin: 0 auto; }
      .modal-header .types { justify-content: center; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <h1>Pokédex</h1>
</header>

<main class="container">
  <div class="controls">
    <input id="searchInput" placeholder="Rechercher...">
    <select id="typeFilter"><option value="">Tous les types</option></select>
    <button id="inaccessibleFilter" type="button">Pokémon inaccessibles</button>
  </div>

  <div id="pokedexGrid" class="grid">
    <div class="status">Chargement du Pokédex...</div>
  </div>
</main>

<div id="modalBg" class="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="hideModal()" aria-label="Fermer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 6L18 18M18 6L6 18" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1_inTvzxt5GKfwj9OiofOH8kprf-fcjL6Jea0G1VzDww/Sheet1";
let allPokemon = [];
let showOnlyInaccessible = false;

function normalizeText(value){ return (value || "").toString().trim(); }
function normalizeName(value){ return normalizeText(value).toLowerCase(); }
function getPokemonName(p){ return p.french || p.nom || p.name || "Nom inconnu"; }
function getPokemonKey(p){ return normalizeName(getPokemonName(p)); }
function getType1(p){ return p["type 1"] || p.type1 || ""; }
function getType2(p){ return p["type 2"] || p.type2 || ""; }
function getZones(p){ return normalizeText(p.zone).split(",").map(z => z.trim()).filter(Boolean); }
function getEvolutionCondition(p){ return p.evolution_condition || p["condition évolution"] || p["condition evolution"] || p.evolutioncondition || ""; }
function hasZone(p){ return getZones(p).length > 0; }

function findPokemonByFrenchName(name){
  if(!name) return null;
  const target = normalizeName(name);
  return allPokemon.find(p => getPokemonKey(p) === target) || null;
}

function getPreviousPokemon(p){ return findPokemonByFrenchName(p.evolves_from_species); }

function getDirectEvolutions(p){
  const name = getPokemonKey(p);
  return allPokemon.filter(candidate => normalizeName(candidate.evolves_from_species) === name);
}

function hasAccessiblePreEvolution(p){
  const visited = new Set();
  let current = p;

  while(current){
    const currentKey = getPokemonKey(current);
    if(visited.has(currentKey)) return false;
    visited.add(currentKey);

    const previous = getPreviousPokemon(current);
    if(!previous) return false;
    if(hasZone(previous)) return true;

    current = previous;
  }

  return false;
}

function isInaccessiblePokemon(p){ return !hasZone(p) && !hasAccessiblePreEvolution(p); }

async function load(){
  const res = await fetch(SHEET_URL);
  const raw = await res.json();

  if(!Array.isArray(raw)){
    throw new Error("Le Google Sheet n'a pas renvoyé une liste exploitable.");
  }

  allPokemon = raw.map(row => {
    const clean = {};
    Object.keys(row).forEach(k => clean[k.trim().toLowerCase()] = row[k]);
    return clean;
  }).filter(p => p.id || p.french || p.nom || p.name);

  fillTypeFilter(allPokemon);
  render(allPokemon);
}

function fillTypeFilter(data){
  const select = document.getElementById("typeFilter");
  const types = new Set();
  select.innerHTML = `<option value="">Tous les types</option>`;

  data.forEach(p => {
    const type1 = getType1(p);
    const type2 = getType2(p);
    if(type1) types.add(type1);
    if(type2) types.add(type2);
  });

  Array.from(types).sort().forEach(type => {
    const option = document.createElement("option");
    option.value = type;
    option.textContent = type;
    select.appendChild(option);
  });
}

function applyFilters(){
  const search = document.getElementById("searchInput").value.toLowerCase().trim();
  const selectedType = document.getElementById("typeFilter").value;

  const filtered = allPokemon.filter(p => {
    const name = normalizeName(getPokemonName(p));
    const id = normalizeName(p.id);
    const type1 = getType1(p);
    const type2 = getType2(p);

    const matchesSearch = name.includes(search) || id.includes(search);
    const matchesType = !selectedType || type1 === selectedType || type2 === selectedType;
    const matchesInaccessible = !showOnlyInaccessible || isInaccessiblePokemon(p);

    return matchesSearch && matchesType && matchesInaccessible;
  });

  render(filtered);
}

function render(data){
  const grid = document.getElementById("pokedexGrid");
  grid.innerHTML = "";

  if(!data.length){
    grid.innerHTML = `<div class="status">Aucun Pokémon trouvé.</div>`;
    return;
  }

  data.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => showPokemon(p);

    card.innerHTML = `
      <div class="pokemon-id">#${p.id || "?"}</div>
      <img src="${p.sprite || ""}" alt="${getPokemonName(p)}">
      <div class="pokemon-name">${getPokemonName(p)}</div>
      <div class="types">
        ${getType1(p) ? `<span class="type">${getType1(p)}</span>` : ""}
        ${getType2(p) ? `<span class="type">${getType2(p)}</span>` : ""}
      </div>
    `;

    grid.appendChild(card);
  });
}

function safeIdForInline(id){ return String(id || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"); }

function evolutionChip(pokemon){
  const condition = getEvolutionCondition(pokemon);

  return `
    <button class="evolution-chip" type="button" onclick="event.stopPropagation(); showPokemonById('${safeIdForInline(pokemon.id)}')">
      <img src="${pokemon.sprite || ""}" alt="${getPokemonName(pokemon)}">
      <span class="evolution-meta">
        <span class="evolution-name">${getPokemonName(pokemon)}</span>
        ${condition ? `<span class="evolution-condition">${condition}</span>` : ""}
      </span>
    </button>
  `;
}

function showPokemonById(id){
  const pokemon = allPokemon.find(p => String(p.id) === String(id));
  if(pokemon) showPokemon(pokemon);
}

function toggleShiny(id){
  const pokemon = allPokemon.find(p => String(p.id) === String(id));
  if(!pokemon || !pokemon.shiny) return;

  const sprite = document.getElementById("modalPokemonSprite");
  const toggle = document.getElementById("shinyToggle");
  const isShiny = sprite.dataset.shiny === "true";

  if(isShiny){
    sprite.src = pokemon.sprite || "";
    sprite.dataset.shiny = "false";
    toggle.classList.remove("active");
    toggle.title = "Afficher le shiny";
  } else {
    sprite.src = pokemon.shiny;
    sprite.dataset.shiny = "true";
    toggle.classList.add("active");
    toggle.title = "Afficher la version normale";
  }
}

function makeInfoBlock(title, content, className = ""){
  if(!content) return "";
  const extraClass = className ? ` ${className}` : "";
  return `<div class="info-block${extraClass}"><strong>${title}</strong>${content}</div>`;
}

function showPokemon(p){
  const name = getPokemonName(p);
  const type1 = getType1(p);
  const type2 = getType2(p);
  const previousPokemon = getPreviousPokemon(p);
  const nextEvolutions = getDirectEvolutions(p);
  const ownEvolutionCondition = getEvolutionCondition(p);

  const preEvolutionBlock = p.evolves_from_species ? makeInfoBlock(
    "Évolue depuis",
    `<div class="evolution-prev">${previousPokemon ? evolutionChip(previousPokemon) : `<span>${p.evolves_from_species}</span>`}</div>`
  ) : "";

  const descriptionBlock = p.flavor_text ? makeInfoBlock("Description", p.flavor_text, "full-row") : "";

  const evolutionBlock = nextEvolutions.length ? makeInfoBlock(
    `Évolution${nextEvolutions.length > 1 ? "s" : ""}`,
    `${ownEvolutionCondition ? `<div style="margin-bottom:10px; font-size:12px; color:var(--muted); font-weight:700;">${ownEvolutionCondition}</div>` : ""}
     <div class="evolution-next-list">${nextEvolutions.map(evolutionChip).join("")}</div>`
  ) : "";

  const zoneBlock = p.zone ? makeInfoBlock(
    "Zone disponible",
    `<div class="zone-list">${getZones(p).map(zone => `<span class="zone-tag">${zone}</span>`).join("")}</div>`
  ) : "";

  const megaCards = [
    p["mega_1_name"] ? `
      <div class="mega-card">
        <strong>${p["mega_1_name"]}</strong>
        <img src="${p["mega_1_sprite"] || ""}" alt="${p["mega_1_name"]}">
        <div class="types">
          ${p["mega_1_type_1"] ? `<span class="type">${p["mega_1_type_1"]}</span>` : ""}
          ${p["mega_1_type_2"] ? `<span class="type">${p["mega_1_type_2"]}</span>` : ""}
        </div>
      </div>
    ` : "",
    p["mega_2_name"] ? `
      <div class="mega-card">
        <strong>${p["mega_2_name"]}</strong>
        <img src="${p["mega_2_sprite"] || ""}" alt="${p["mega_2_name"]}">
        <div class="types">
          ${p["mega_2_type_1"] ? `<span class="type">${p["mega_2_type_1"]}</span>` : ""}
          ${p["mega_2_type_2"] ? `<span class="type">${p["mega_2_type_2"]}</span>` : ""}
        </div>
      </div>
    ` : ""
  ].filter(Boolean).join("");

  const megaBlock = megaCards ? makeInfoBlock("Méga-évolutions", `<div class="mega-list">${megaCards}</div>`) : "";
  const infoBlocks = [descriptionBlock, preEvolutionBlock, zoneBlock, evolutionBlock, megaBlock].filter(Boolean);

  document.getElementById("modalContent").innerHTML = `
    <div class="modal-header">
      <div class="header-sprites">
        <img id="modalPokemonSprite" class="header-main-sprite" src="${p.sprite || ""}" alt="${name}">
        ${p.shiny ? `
          <button class="header-shiny" id="shinyToggle" type="button" title="Afficher le shiny" onclick="toggleShiny('${safeIdForInline(p.id)}')">✨</button>
        ` : ""}
      </div>

      <div>
        <div class="modal-id">#${p.id || "?"}</div>
        <h2 class="modal-title">${name}</h2>
        <div class="types">
          ${type1 ? `<span class="type">${type1}</span>` : ""}
          ${type2 ? `<span class="type">${type2}</span>` : ""}
        </div>
      </div>
    </div>

    <div class="info-grid">${infoBlocks.join("")}</div>
  `;

  document.getElementById("modalBg").style.display = "flex";
}

function hideModal(){ document.getElementById("modalBg").style.display = "none"; }
function closeModal(event){ if(event.target.id === "modalBg") hideModal(); }

function runTests(){
  const base = { id: "1", french: "Base", zone: "Forêt" };
  const evo = { id: "2", french: "Evo", evolves_from_species: "Base", zone: "" };
  const loopA = { id: "A", french: "Loop A", evolves_from_species: "Loop B", zone: "" };
  const loopB = { id: "B", french: "Loop B", evolves_from_species: "Loop A", zone: "" };
  const old = allPokemon;
  allPokemon = [base, evo, loopA, loopB];
  console.assert(hasAccessiblePreEvolution(evo) === true, "Préévolution avec zone non détectée");
  console.assert(isInaccessiblePokemon(evo) === false, "Évolution accessible marquée inaccessible");
  console.assert(hasAccessiblePreEvolution(loopA) === false, "Cycle d'évolution non sécurisé");
  console.assert(isInaccessiblePokemon(loopA) === true, "Cycle sans zone mal classé");
  console.assert(getEvolutionCondition({ evolution_condition: "Niveau 16" }) === "Niveau 16", "Condition évolution snake_case non détectée");
  console.assert(getEvolutionCondition({ "condition évolution": "Pierre Lune" }) === "Pierre Lune", "Condition évolution FR non détectée");
  console.assert(makeInfoBlock("Test", "") === "", "Bloc vide non ignoré");
  allPokemon = old;
  console.info("Tests Pokédex terminés.");
}

document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("typeFilter").addEventListener("change", applyFilters);
document.getElementById("inaccessibleFilter").addEventListener("click", function(){
  showOnlyInaccessible = !showOnlyInaccessible;
  this.classList.toggle("active", showOnlyInaccessible);
  applyFilters();
});

runTests();
load().catch(error => {
  console.error(error);
  document.getElementById("pokedexGrid").innerHTML = `<div class="status">Erreur de chargement du Pokédex.</div>`;
});
</script>
</body>
</html>
