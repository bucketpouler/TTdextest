<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Tools — Pokédex</title>
  <style>
    :root {
      --page-bg: #eef4f6;
      --grid-line: rgba(98, 135, 148, 0.12);
      --panel: #dfeaf0;
      --panel-light: #eef6f8;
      --blue: #6aa9c4;
      --blue-dark: #3f6473;
      --coral: #e8755f;
      --green: #77b475;
      --text: #405965;
      --muted: #7d99a5;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background-color: var(--page-bg);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    header {
      max-width: 1180px;
      margin: 28px auto 12px;
      padding: 30px 24px;
      border-radius: 14px;
      background: linear-gradient(135deg, #b7def1 0%, #f3d3dc 100%);
      border: 1px solid rgba(106, 169, 196, 0.28);
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: clamp(38px, 7vw, 76px);
      text-transform: uppercase;
      color: #15202a;
    }
    .container { max-width: 1180px; margin: 0 auto; padding: 0 24px 54px; }
    .panel {
      padding: 14px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid rgba(91, 125, 138, 0.2);
    }
    .login-panel { max-width: 480px; margin: 18px auto 0; }
    .hidden { display: none !important; }
    input, select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(91, 125, 138, 0.2);
      background: var(--panel-light);
      font-weight: 700;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    button { cursor: pointer; }
    button.primary { background: var(--blue); color: white; border-color: transparent; }
  </style>
</head>
<body>
<header><h1>Staff Tools</h1></header>
<main class="container">
  <section class="panel">
    <p>Version complète du Staff Tools avec générateur de rencontre, rangs, talents et capture.</p>
    <p>Mot de passe par défaut : <strong>staff</strong></p>
    <p>Le code complet a été préparé dans le canvas ChatGPT. Si tu souhaites de nouvelles fonctionnalités, il suffira de remplacer ce fichier.</p>
  </section>
</main>
</body>
</html>
